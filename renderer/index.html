<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeerTexto</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>LeerTexto</h1>
      <p class="muted">
        Atajos: <code>Ctrl+Shift+S</code> (seleccionar) • <code>Ctrl+Shift+L</code> (leer)
      </p>
    </header>

    <section class="card">
      <div class="row">
        <button id="btnSelect">Seleccionar área</button>
        <button id="btnRead" class="primary">Leer ahora</button>
      </div>
      <div class="row">
        <label for="lang">OCR idioma</label>
        <select id="lang">
          <option value="spa" selected>Español (spa)</option>
          <option value="eng">Inglés (eng)</option>
          <option value="jpn">Japonés (jpn)</option>
        </select>
        <label class="inline">
          <input type="checkbox" id="autoSpeak" checked />
          Hablar automático
        </label>
      </div>
      <div class="meta">
        <div><strong>Área:</strong> <span id="areaText">—</span></div>
        <div><strong>Estado:</strong> <span id="statusText">Listo</span></div>
      </div>
    </section>

    <section class="card">
      <div class="row">
        <label for="rate">Velocidad</label>
        <input id="rate" type="range" min="0.6" max="1.4" step="0.05" value="1" />
        <span id="rateVal" class="mono">1.00</span>
        <button id="btnStop" class="ghost">Parar voz</button>
      </div>
      <textarea id="text" placeholder="El texto reconocido aparecerá aquí..." spellcheck="false"></textarea>
    </section>

    <footer class="muted">
      <p>Nota: algunos juegos con anti-cheat pueden bloquear capturas de pantalla.</p>
    </footer>

    <script src="./renderer.js"></script>
  </body>
</html>
